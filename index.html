<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Digital</title>

<style>
    body{
        margin:0;
        font-family: Arial, Helvetica, sans-serif;
        background:#f2f2f2;
        text-align:center;
    }

    .topo{
        background:#ffffff;
        padding:20px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .container{
        margin-top:60px;
    }

    h1{
        font-size:28px;
        margin-bottom:5px;
    }

    h2{
        font-size:36px;
        margin-top:0;
    }

    .linha{
        width:60%;
        height:10px;
        background:#000;
        margin:30px auto;
    }

    .botao{
        background:#183a6b;
        color:#fff;
        border:none;
        padding:15px 40px;
        font-size:16px;
        border-radius:6px;
        cursor:pointer;
        transition:0.3s;
    }

    .botao:hover{
        background:#0f2747;
    }

    .status{
        margin:25px auto;
        width:40%;
        background:#d8e6d8;
        padding:12px;
        border-radius:4px;
        font-weight:bold;
        color:#2d5a2d;
    }

    footer{
        margin-top:80px;
        background:#000;
        height:120px;
    }
</style>
</head>

<body>

<div class="topo">
    <strong>Institucional</strong>
</div>

<div class="container">
    <h1>Institucional</h1>
    <h2>Diploma Digital</h2>

    <div class="linha"></div>

    <!-- BOTÃO DE DOWNLOAD -->
    <a href="diploma.pdf" download>
        <button class="botao">DOWNLOAD</button>
    </a>

    <div class="status">Diploma Ativo</div>
</div>

<footer></footer>

</body>
</html>
